<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fundlookup</title>
  </head>
  <body class="bg-slate-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased selection:bg-gray-500/30 overflow-hidden">
    <!-- SVG Filters for Liquid Effect -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
      <defs>
        <filter id="liquid-surface" x="-20%" y="-20%" width="140%" height="140%">
           <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" result="noise" />
           <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" />
           <feSpecularLighting surfaceScale="0.2" specularConstant="0.8" specularExponent="15" lighting-color="rgba(255,255,255,0.4)" result="specular">
             <fePointLight x="-5000" y="-10000" z="20000" />
           </feSpecularLighting>
           <feComposite in="specular" in2="SourceAlpha" operator="in" result="specular" />
           <feComposite in="specular" in2="SourceGraphic" operator="over" />
        </filter>
      </defs>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
